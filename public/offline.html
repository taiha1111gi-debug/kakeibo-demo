<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>オフライン | Mellow 家計簿</title>
  <style>
    :root {
      color-scheme: light dark;
      --background: #f4f5f2;
      --surface: #ffffff;
      --foreground: #26332c;
      --muted: #6b766f;
      --brand: #315c4b;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --background: #131b17;
        --surface: #1c2822;
        --foreground: #e7ece8;
        --muted: #93a099;
        --brand: #7fb99e;
      }
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--background);
      color: var(--foreground);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      padding: 24px;
      box-sizing: border-box;
    }
    main {
      background: var(--surface);
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 13px; line-height: 1.7; color: var(--muted); margin: 0 0 20px; }
    button {
      appearance: none;
      border: 0;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 12px;
      width: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <p style="font-size: 40px; margin: 0 0 12px;">📡</p>
    <h1>オフラインです</h1>
    <p>Mellow 家計簿の閲覧・登録には通信が必要です。<br />接続が回復したら、もう一度お試しください。</p>
    <button type="button" onclick="location.reload()">再読み込み</button>
  </main>
</body>
</html>
